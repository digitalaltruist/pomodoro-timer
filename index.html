<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="app">
        <main class="timer" aria-label="Pomodoro timer">
            <p class="timer__mode" id="mode-indicator">Work Session</p>

            <h1 class="timer__display" id="time-display" aria-live="polite">25:00</h1>

            <div class="timer__controls" role="group" aria-label="Timer controls">
                <button class="timer__button timer__button--primary" id="start-pause-btn" type="button">
                    Start
                </button>
                <button class="timer__button timer__button--secondary" id="reset-btn" type="button">
                    Reset
                </button>
            </div>

            <button class="timer__duration-toggle" id="duration-toggle" type="button" aria-expanded="false" aria-controls="duration-drawer">
                <span class="timer__duration-summary" id="duration-summary">Work: 25 min · Break: 5 min</span>
                <span class="timer__duration-chevron" aria-hidden="true">⏴</span>
            </button>

            <section class="section-duration" id="duration-drawer" aria-label="Duration settings" hidden>
                <div class="section-duration__group">
                    <label class="section-duration__label" for="work-duration-input">Work</label>
                    <div class="section-duration__stepper">
                        <button class="section-duration__stepper-button" id="work-decrement-btn" type="button" aria-label="Decrease work minutes">−</button>
                        <input class="section-duration__input" id="work-duration-input" type="number" min="1" max="60" value="25">
                        <button class="section-duration__stepper-button" id="work-increment-btn" type="button" aria-label="Increase work minutes">+</button>
                    </div>
                </div>

                <div class="section-duration__group">
                    <label class="section-duration__label" for="break-duration-input">Break minutes</label>
                    <div class="section-duration__stepper">
                        <button class="section-duration__stepper-button" id="break-decrement-btn" type="button" aria-label="Decrease break minutes">−</button>
                        <input class="section-duration__input" id="break-duration-input" type="number" min="1" max="60" value="5">
                        <button class="section-duration__stepper-button" id="break-increment-btn" type="button" aria-label="Increase break minutes">+</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
